<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f0e8;
            --sage: #7a9e87;
            --sage-dark: #5a7d67;
            --charcoal: #2c2c2c;
            --muted: #8a8a8a;
            --border: #d4c9b8;
            --white: #ffffff;
            --shadow: 0 8px 40px rgba(44, 44, 44, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            font-family: 'DM Sans', sans-serif;
            background-color: #eee8de;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(122, 158, 135, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(122, 158, 135, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 10%, rgba(232, 221, 208, 0.6) 0%, transparent 40%);
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle grid texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(122,158,135,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(122,158,135,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Decorative circle */
        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 60px solid rgba(122, 158, 135, 0.07);
            top: -150px;
            right: -150px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Sage accent bar at top */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--sage) 0%, var(--sage-dark) 100%);
            border-radius: 24px 24px 0 0;
        }

        .card-header {
            margin-bottom: 32px;
            text-align: center;
        }

        .card-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--charcoal);
            letter-spacing: -0.5px;
            font-weight: 700;
        }

        .card-header p {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.875rem;
        }

        .divider {
            width: 40px;
            height: 3px;
            background: var(--sage);
            border-radius: 2px;
            margin: 12px auto 0;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--charcoal);
            font-weight: 500;
            font-size: 0.82rem;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.93rem;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--charcoal);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: var(--sage);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(122, 158, 135, 0.15);
        }

        input::placeholder {
            color: #bbb;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(90, 125, 103, 0.3);
        }

        .btn-submit:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(90, 125, 103, 0.35);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .register-link {
            margin-top: 20px;
            text-align: center;
            color: var(--muted);
            font-size: 0.875rem;
        }

        .register-link a {
            color: var(--sage-dark);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .register-link a:hover {
            border-color: var(--sage-dark);
        }

        @media (max-width: 540px) {
            .card {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h1>Welcome Back</h1>
            <div class="divider"></div>
            <p>Login to your account</p>
        </div>

        <form action="./small task-1.html">

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-submit">Login</button>

            <p class="register-link">Don't have an account? <a href="./index.html">Register here</a></p>

        </form>
    </div>

</body>
</html>
